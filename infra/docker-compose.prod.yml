services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    env_file:
      - ../.env
    volumes:
      - chessju_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chessju -d chessju"]
      interval: 10s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    volumes:
      - chessju_valkey_data:/data

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  chessju_postgres_data:
  chessju_valkey_data:
  caddy_data:
  caddy_config:
