services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env.example
    environment:
      CHESSJU_DATABASE_URL: postgresql+psycopg://chessju:chessju_dev_password@postgres:5432/chessju
      CHESSJU_VALKEY_URL: redis://valkey:6379/0
      CHESSJU_LOCAL_STORAGE_ROOT: /data/storage
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - chessju_storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    env_file:
      - ../.env.example
    environment:
      CHESSJU_DATABASE_URL: postgresql+psycopg://chessju:chessju_dev_password@postgres:5432/chessju
      CHESSJU_VALKEY_URL: redis://valkey:6379/0
      CHESSJU_LOCAL_STORAGE_ROOT: /data/storage
    volumes:
      - ../worker:/app
      - chessju_storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chessju
      POSTGRES_USER: chessju
      POSTGRES_PASSWORD: chessju_dev_password
    ports:
      - "5432:5432"
    volumes:
      - chessju_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chessju -d chessju"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - chessju_valkey_data:/data

volumes:
  chessju_postgres_data:
  chessju_valkey_data:
  chessju_storage:
